version: '3.8'

services:
  baby-diary:
    image: python:3.11-slim
    working_dir: /app
    command: bash -c "pip install --no-cache-dir -r requirements.txt && python3 server.py"
    container_name: baby-diary-app
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - ./:/app
      - ./data:/app/data
      - ./ico:/app/ico
      - ./js:/app/js
      - ./css:/app/css
    environment:
      PYTHONUNBUFFERED: "0"
    restart: unless-stopped
    networks:
      - baby-diary-network

networks:
  baby-diary-network:
    driver: bridge
