version: '3.8'

# Альтернативный docker-compose для прямого клонирования с GitHub
# Используйте этот файл если хотите развернуть приложение с GitHub прямо на TrueNAS

services:
  baby-diary:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: baby-diary-app
    ports:
      - "8000:8000"
    volumes:
      # Сохраняем данные в именованный том (не удалится при docker-compose down)
      - diary-data:/app/data
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  diary-data:
    driver: local
    # Опционально: привяжите к конкретной папке на диске TrueNAS
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /mnt/tank/baby-diary-data
