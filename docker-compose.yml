version: '3.8'

services:
  baby-diary:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: baby-diary-app
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    restart: unless-stopped
    networks:
      - baby-diary-network

networks:
  baby-diary-network:
    driver: bridge
